<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RouteWeather Admin</title>
    <!-- Materialize CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        body {
            background-color: #f5f5f5;
            display: flex;
            min-height: 100vh;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .admin-card {
            padding: 30px;
            width: 100%;
            max-width: 500px;
            border-radius: 8px;
        }

        .file-field .btn {
            background-color: #1976d2;
        }

        .submit-btn {
            width: 100%;
            margin-top: 20px;
            background-color: #1976d2;
        }

        .submit-btn:hover {
            background-color: #1565c0;
        }

        #status {
            margin-top: 20px;
            font-weight: 500;
        }

        .brand-logo-icon {
            font-size: 3rem;
            color: #1976d2;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>
    <div class="card admin-card z-depth-3">
        <div class="center-align">
            <i class="material-icons brand-logo-icon">cloud_upload</i>
            <h4 style="margin-top: 0;">Upload GPX Route</h4>
        </div>

        <form id="uploadForm">
            <div class="row">
                <div class="input-field col s12">
                    <i class="material-icons prefix">edit</i>
                    <input type="text" id="routeName" name="routeName" required>
                    <label for="routeName">Route Name</label>
                </div>
            </div>

            <div class="row" style="margin-top: -15px;">
                <div class="input-field col s12">
                    <!-- Datetime picker for local time -->
                    <i class="material-icons prefix">access_time</i>
                    <input type="datetime-local" id="startTime" name="startTime" required>
                    <label for="startTime" class="active">Route Start Time</label>
                </div>
            </div>

            <div class="file-field input-field">
                <div class="btn">
                    <span>File</span>
                    <input type="file" id="gpxFile" accept=".gpx" required>
                </div>
                <div class="file-path-wrapper">
                    <input class="file-path validate" type="text" placeholder="Upload one or more files">
                </div>
            </div>

            <button class="btn waves-effect waves-light submit-btn" type="submit" id="submitBtn">
                Upload Route (Owner: rw)
                <i class="material-icons right">send</i>
            </button>
        </form>

        <div id="status" class="center-align"></div>
    </div>

    <!-- Materialize JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
    <script>
        // Initialize Materialize components
        document.addEventListener('DOMContentLoaded', function () {
            M.updateTextFields();
        });

        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const fileInput = document.getElementById('gpxFile');
            const startTimeInput = document.getElementById('startTime');
            const routeNameInput = document.getElementById('routeName');
            const statusDiv = document.getElementById('status');
            const submitBtn = document.getElementById('submitBtn');
            const file = fileInput.files[0];

            if (!file) return;

            const formData = new FormData();
            formData.append('file', file);
            formData.append('owner', 'rw');
            if (startTimeInput.value) {
                formData.append('startTime', startTimeInput.value);
            }
            if (routeNameInput.value.trim() !== '') {
                formData.append('routeName', routeNameInput.value.trim());
            }

            statusDiv.textContent = 'Uploading...';
            statusDiv.className = 'center-align blue-text text-darken-2';
            submitBtn.classList.add('disabled');

            try {
                const response = await fetch('/api/gpx/upload', {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    const result = await response.json();
                    statusDiv.textContent = `Success! Uploaded ${result.fileName}`;
                    statusDiv.className = 'center-align green-text text-darken-2';
                    fileInput.value = '';
                    document.querySelector('.file-path').value = '';
                } else {
                    const error = await response.json();
                    statusDiv.textContent = `Error: ${error.error || 'Upload failed'}`;
                    statusDiv.className = 'center-align red-text text-darken-2';
                }
            } catch (err) {
                statusDiv.textContent = `Error: ${err.message}`;
                statusDiv.className = 'center-align red-text text-darken-2';
            } finally {
                submitBtn.classList.remove('disabled');
            }
        });
    </script>
</body>

</html>
